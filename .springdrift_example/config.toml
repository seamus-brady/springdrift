[appraisal]
# model = ""                           # defaults to task_model
# max_tokens = 4096
# min_complexity = "medium"            # minimum task complexity for pre-mortem ("simple", "medium", "complex")
# min_steps = 3                        # minimum task steps for pre-mortem

# ── Affect ───────────────────────────────────────────────────────────────────

[affect]
# enabled = true                      # Whether affect monitoring is active (default: true)
# history_window = 20                 # Cycles to consider for affect computation (default: 20)

# ── Knowledge library ────────────────────────────────────────────────────────

[knowledge]
# enabled = false                     # Enable document library (default: false)

# ── Remembrancer ────────────────────────────────────────────────────────────
# The Remembrancer is a specialist agent that works with the full depth of
# memory (months, not days) — finding forgotten patterns, resurrecting dormant
# threads, consolidating narrative entries into higher-level knowledge.

[remembrancer]
# Enable the Remembrancer agent (default: true — core subsystem).
# Meta-learning judgement workers (consolidation, goal review, skill
# decay, strategy review) dispatch to this agent off-cog. Disabling
# leaves the three mechanical audits running but the judgement workers
# will log-warn and skip each tick.
# enabled = true

# Model for consolidation synthesis (default: reasoning_model — needs strong synthesis)
# model = ""

# Max turns per Remembrancer invocation (default: 8)
# max_turns = 8

# Consolidation schedule — "weekly" or "monthly" (default: "weekly")
# consolidation_schedule = "weekly"

# Minimum decayed confidence before a fact is flagged for review (default: 0.3)
# review_confidence_threshold = 0.3

# Minimum days of inactivity before a thread is considered dormant (default: 7)
# dormant_thread_days = 7

# Minimum CBR cases to form a pattern (default: 3)
# min_pattern_cases = 3

# ── Meta-Learning ───────────────────────────────────────────────────────────
# Phase A: Strategy Registry — named, reusable approaches with tracked
# outcomes, replayed from .springdrift/memory/strategies/.
# The Archivist tags narrative entries with strategy_used; the Curator
# surfaces the top 3 active strategies in the sensorium <strategies> block.
# New strategies enter the registry only via Remembrancer pattern mining
# or operator seed events — the Curator does not invent names.

[meta_learning]
# Phase A - Strategy Registry. When True, Archivist records strategy_used
# events from the curation prompt and the sensorium <strategies> block
# surfaces top-N active strategies. Default: true.
# strategy_registry_enabled = true

# Meta-learning worker pool. Seven BEAM workers run off-cog and
# never appear in the operator-visible scheduler. Three are mechanical
# audits (pure compute, no LLM); four are judgement jobs that dispatch
# to the running Remembrancer agent via its task_subject. Set enabled
# = false to disable the entire pool.
# enabled = true                                # Default: true
# consolidation_interval_hours = 168            # Default: 168 (weekly)
# goal_review_interval_hours = 24               # Default: 24 (daily)
# skill_decay_interval_hours = 168              # Default: 168 (weekly)
# affect_correlation_interval_hours = 168       # Default: 168 (weekly)
# strategy_review_interval_hours = 336          # Default: 336 (fortnightly)

# Fluency/grounding Phase 2 — integrity signals as meta-cognition.
# fabrication_audit cross-references synthesis facts against the cycle-log
# tool record; voice_drift counts self-congratulatory phrases in narrative
# entries. Both write an integrity fact the sensorium surfaces on the next
# cycle, and both seed a learning goal on first integration.
# fabrication_audit_interval_hours = 24          # Default: 24 (daily)
# voice_drift_interval_hours = 24                # Default: 24 (daily)

# Budget caps
# max_reflection_budget_pct = 25     # Max % of recent cycles that may be
                                     # meta-learning fires. 0 disables. Default: 25.
# max_promotions_per_day = 3         # Max promote_insight + auto-strategy
                                     # writes per rolling 24h window. Default: 3.

# Strategy Registry pruning — bounds the registry so it can't grow
# without limit. The periodic strategy_review job applies these.
# strategy_max_active = 20                # Soft cap on active strategies.
                                          # Sensorium warns when exceeded.
                                          # 0 disables. Default: 20.
# strategy_low_success_threshold = 0.4    # Laplace-smoothed success rate
                                          # below which a strategy with
                                          # enough uses becomes an
                                          # auto-archive candidate.
# strategy_low_success_min_uses = 10      # Min uses before low-success
                                          # pruning can fire. 0 disables.
# strategy_stale_archive_days = 60        # Auto-archive strategies idle
                                          # for this many days. 0 disables.

# ── AgentLair (behavioral trust network) ────────────────────────────────────

[agentlair]
# enabled = false                     # Enable AgentLair telemetry (default: false)
# api_key = "al_live_..."             # AgentLair API key
# endpoint_url = "https://api.agentlair.dev"  # AgentLair API base URL
# trust_query = true                  # Expose /trust/{agent_id} on web API (default: true)

# ── Communications ──────────────────────────────────────────────────────────

[comms]
# Enable the communications agent (default: true)
# enabled = true

# AgentMail inbox ID (required when enabled)
# inbox_id = ""

# Env var holding the AgentMail API key (default: AGENTMAIL_API_KEY)
# api_key_env = "AGENTMAIL_API_KEY"

# Agent's email address (for display/logging)
# from_address = ""

# Email addresses the agent is allowed to contact (hard allowlist)
# allowed_recipients = []

# Display name for outbound email (defaults to agent name)
# from_name = ""

# Max outbound emails per hour (default: 20)
# max_outbound_per_hour = 20

# Inbox poll interval in milliseconds (default: 60000 = 1 minute)
# poll_interval_ms = 60000

# ── Backup ──────────────────────────────────────────────────────────────────
# Git-backed state backup. Initialises a git repo inside .springdrift/ and
# commits all state changes periodically. Without a remote, the backup only
# exists on the same disk as the data — configure remote_url for offsite safety.

[backup]
# enabled = true                      # Enable git backup (default: true)
# mode = "periodic"                   # "periodic" | "after_cycle" | "manual"
# interval_ms = 300000                # Commit interval in ms (default: 300000 = 5 minutes)
# remote_url = ""                     # Git remote URL (recommended — e.g. git@github.com:org/data.git)
# branch = "main"                     # Branch name (default: main)

# ── Captures ────────────────────────────────────────────────────────────────
# MVP commitment tracker. After each cycle a small LLM call scans the cycle
# output for commitments and promises; results are written as "captures" the
# agent can clarify to a scheduled cycle or dismiss.

[captures]
# scanner_enabled = true        # Post-cycle commitment scanner (default: true)
# expiry_days = 14              # Auto-expire pending captures after N days (default: 14)
# max_per_cycle = 10            # Max captures kept per cycle after sanity filter (default: 10)

# ── Deputies ────────────────────────────────────────────────────────────────
# MVP delegated-attention layer. When enabled, cog spawns an ephemeral read-only
# deputy for each root delegation that produces a <briefing> XML block prepended
# to the specialist agent's instruction. The briefing cites relevant CBR cases,
# facts, and known pitfalls — same smarts the cog loop has, now available to
# the specialist before its react loop starts. Full design:
# docs/roadmap/planned/deputy-agents.md

[deputies]
# enabled = true                # Deputy briefings (default: true — set false to disable)
# model = "claude-haiku-4-5"    # LLM used for briefings (default: same as task_model)
# max_tokens = 800              # Max tokens per briefing call (default: 800)
# timeout_ms = 15000            # Timeout awaiting briefing (default: 15000 — agent proceeds without if exceeded)
