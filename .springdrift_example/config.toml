# ─────────────────────────────────────────────────────────────────────────────
# Springdrift — example config.toml
# Copy to .springdrift/config.toml and customise.
# All fields are optional — defaults (shown in comments) are applied at startup.
# CLI flags always override config file values.
#
# IMPORTANT: bare keys (provider, max_tokens, gui, etc.) MUST appear before
# any [section] header. TOML assigns bare keys to the section above them.
# ─────────────────────────────────────────────────────────────────────────────

# ── Provider and models ──────────────────────────────────────────────────────
# "anthropic" | "vertex" | "openrouter" | "openai" | "mistral" | "local" | "mock"
provider = "mock"

# Top-level model overrides (apply regardless of provider — prefer per-provider sections)
# task_model = "claude-haiku-4-5-20251001"
# reasoning_model = "claude-opus-4-6"

# ── Behaviour ────────────────────────────────────────────────────────────────
max_tokens = 2048            # Max output tokens per LLM call
max_turns = 5                # React-loop iterations per message
max_consecutive_errors = 3   # Tool failures before abort
# max_context_messages = 100 # Sliding-window cap on context messages (default: unlimited)
gui = "web"                  # "tui" (terminal) or "web" (browser on port 12001)

# ── Logging ──────────────────────────────────────────────────────────────────
log_verbose = false
write_anywhere = false
# log_retention_days = 30
# log_max_file_bytes = 10485760
# skills_dirs = ["/path/to/my/skills"]

# ── D' safety ────────────────────────────────────────────────────────────────
# dprime_enabled = true
# dprime_config = "dprime.json"

# ─────────────────────────────────────────────────────────────────────────────
# Sections below. Order doesn't matter for [sections].
# ─────────────────────────────────────────────────────────────────────────────

# ── Identity ─────────────────────────────────────────────────────────────────

[agent]
name = "Nemo"                # Substituted into {{agent_name}} in identity/persona.md
# version = "..."            # Optional override. Defaults to the package
                             # version read from gleam.toml at startup
                             # (currently 0.8.0). Set this to give your
                             # instance a custom version label.

# ── Provider-specific models ─────────────────────────────────────────────────
# Only the active provider's section is used at runtime.

[anthropic]
# task_model = "claude-haiku-4-5-20251001"
# reasoning_model = "claude-opus-4-6"
# thinking_budget_tokens = 10000  # Extended thinking token budget for reasoning model (default: none)

[vertex]
# project_id = "my-gcp-project"
# location = "europe-west1"
# endpoint = "europe-west1-aiplatform.googleapis.com"
# task_model = "claude-haiku-4-5"
# reasoning_model = "claude-opus-4-6"

[mistral]
# task_model = "mistral-small-latest"
# reasoning_model = "mistral-large-latest"

[local]
# task_model = "smollm3-3b"
# reasoning_model = "smollm3-3b"

# ── Memory ───────────────────────────────────────────────────────────────────

[narrative]
threading = true
summaries = false
summary_schedule = "weekly"
# Days of narrative + CBR + facts history the Librarian replays into ETS at
# startup. Bound on housekeeping reach (dedup, conflict resolution, pruning).
# Bigger window = longer reach + slower startup. Default 180.
# max_days = 180
# archivist_model = ""
# archivist_max_tokens = 4096
# redact_secrets = true
# preamble_budget_chars = 8000

[cbr]
# embedding_enabled = true
# embedding_model = "nomic-embed-text"
# embedding_base_url = "http://localhost:11434"
# Weights tuned from experiment-3 ablation (must sum to 1.0).
# When embeddings unavailable, embedding_weight is redistributed.
# field_weight = 0.10
# index_weight = 0.25
# recency_weight = 0.05
# domain_weight = 0.10
# embedding_weight = 0.40
# utility_weight = 0.10
# min_score = 0.01

[scoring.threading]
# location_weight = 3
# domain_weight = 2
# keyword_weight = 1
# threshold = 3

# ── Safety ───────────────────────────────────────────────────────────────────

[dprime]
# gate_timeout_ms = 60000
# normative_calculus_enabled = true   # Enabled by default; requires identity/character.json

[escalation]
# enabled = true
# tool_failure_threshold = 2
# safety_score_threshold = 0.4

# ── Agents ───────────────────────────────────────────────────────────────────

[agents.planner]
# max_tokens = 2048
# max_turns = 5
# max_errors = 2

[agents.project_manager]
# max_tokens = 2048
# max_turns = 15
# max_errors = 3

[agents.researcher]
# max_tokens = 2048
# max_turns = 8
# max_errors = 3
# max_context_messages = 30
# Auto-store threshold for web-fetching tool results. When a tool returns
# more than this many characters, the executor stores the full content as
# an artifact and returns a short preview + artifact_id in place of the
# raw body. Keeps the researcher's context window from filling with 30KB
# article bodies. Set to 0 to disable.
# auto_store_threshold_bytes = 8192

[agents.coder]
# max_tokens = 4096
# max_turns = 10
# max_errors = 3

[agents.writer]
# max_tokens = 4096
# max_turns = 5
# max_errors = 2

[agents.scheduler]
# max_tokens = 1024
# max_turns = 4
# max_errors = 2

[delegation]
# max_depth = 3                  # Max agent delegation depth (default: 3)
# team_max_members = 5           # Max agents per team (default: 5)
# team_token_budget = 200000     # Max tokens across all team members + synthesis (default: 200000)
# team_max_debate_rounds = 3     # Max debate rounds for DebateAndConsensus (default: 3)

# ── Teams ────────────────────────────────────────────────────────────────────
# Define agent teams as [teams.<name>] sections. Each team appears as a
