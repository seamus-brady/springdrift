# ─────────────────────────────────────────────────────────────────────────────
# Springdrift — example config.toml
# Copy to .springdrift/config.toml and customise.
# All fields are optional — defaults (shown in comments) are applied at startup.
# CLI flags always override config file values.
# ─────────────────────────────────────────────────────────────────────────────

# ── LLM provider and models ─────────────────────────────────────────────────

# "anthropic" | "openrouter" | "openai" | "mistral" | "local" | "mock"
provider = "mock"

# Model for Simple queries (fast, cheap)
# task_model = "claude-haiku-4-5-20251001"      # Anthropic
# task_model = "mistral-small-latest"            # Mistral
# task_model = "gpt-4o-mini"                     # OpenAI / OpenRouter

# Model for Complex queries (slow, powerful)
# reasoning_model = "claude-opus-4-6"            # Anthropic
# reasoning_model = "mistral-large-latest"       # Mistral
# reasoning_model = "gpt-4o"                     # OpenAI / OpenRouter

# Maximum output tokens per LLM call (default: 2048)
max_tokens = 2048

# ── Loop control ─────────────────────────────────────────────────────────────

# React-loop iterations per message before giving up (default: 5)
max_turns = 5

# Consecutive tool failures before the loop aborts (default: 3)
max_consecutive_errors = 3

# Sliding-window cap on context messages; oldest dropped first (default: unlimited)
# max_context_messages = 100

# ── GUI ──────────────────────────────────────────────────────────────────────

# GUI mode: "tui" (terminal, default) or "web" (browser)
gui = "tui"

# ── Logging and filesystem ───────────────────────────────────────────────────

# Log full LLM request/response payloads to the cycle log (default: false)
log_verbose = false

# Allow write_file outside the project directory (default: false)
write_anywhere = false

# Days to retain system log files before cleanup (default: 30)
# log_retention_days = 30

# Maximum system log file size in bytes before rotation (default: 10485760 = 10MB)
# log_max_file_bytes = 10485760

# Extra directories to scan for SKILL.md files
# Default dirs (.springdrift/skills and ~/.config/springdrift/skills) are always included
# skills_dirs = ["/path/to/my/skills"]

# ── D' safety system ────────────────────────────────────────────────────────

# Enable D' safety evaluation before tool dispatch (default: false)
dprime_enabled = false

# Path to D' config JSON (default: built-in)
# dprime_config = "dprime.json"

# ── Agent identity ─────────────────────────────────────────────────────────

[agent]
# Agent name — substituted into {{agent_name}} in identity/persona.md
name = "Springdrift"
# version = ""

# ── Prime Narrative ─────────────────────────────────────────────────────────

[narrative]
# directory = ".springdrift/memory/narrative"  # Default location
# archivist_model = ""       # Defaults to task_model
# archivist_max_tokens = 4096  # Max output tokens for archivist LLM calls
threading = true             # Auto-assign threads by overlap scoring
summaries = false            # Enable periodic summaries
summary_schedule = "weekly"  # "weekly" or "monthly"
# max_days = 30              # Days of history replayed into ETS at startup
# redact_secrets = true      # Redact API keys/tokens/passwords in logs (default: true, --no-redact to disable)
# Max chars for rendered preamble slots (default: 8000, ~2000 tokens)
# preamble_budget_chars = 8000

# ── Timeouts ─────────────────────────────────────────────────────────────────
# All values in milliseconds unless noted otherwise.

[timeouts]
# LLM request timeout — how long to wait for a single LLM API call (default: 300000 = 5 min)
# llm_request_ms = 300000

# Query complexity classification timeout (default: 10000 = 10s)
# classify_ms = 10000

# Agent inter-turn delay — pacing between react-loop iterations (default: 200)
# inter_turn_delay_ms = 200

# Process startup handshake timeout (default: 5000 = 5s)
# startup_ms = 5000

# Librarian/Curator startup timeout — larger due to ETS replay (default: 30000 = 30s)
# librarian_startup_ms = 30000

# Scheduler job completion timeout — max time for a scheduled job (default: 300000 = 5 min)
# scheduler_job_ms = 300000

# Supervisor restart window — sliding window for counting restart events (default: 60000 = 60s)
# restart_window_ms = 60000

# Scheduler stuck-job timeout — mark job as failed if still running (default: 600000 = 10 min)
# scheduler_stuck_ms = 600000

# Scheduler tool timeout — how long scheduler agent tools wait for runner reply (default: 5000 = 5s)
# scheduler_tool_ms = 5000

# ── Scheduler ────────────────────────────────────────────────────────────────
# Resource limits for autonomous scheduler execution.
[scheduler]
# Max autonomous cycles the scheduler may fire per hour (default: 20, 0 = unlimited)
# max_autonomous_cycles_per_hour = 20

# Max total tokens (input + output) the scheduler may consume per hour (default: 500000, 0 = unlimited)
# autonomous_token_budget_per_hour = 500000

# ── Retry ────────────────────────────────────────────────────────────────────
# LLM call retry configuration with exponential backoff.

[retry]
# Maximum number of retry attempts per LLM call (default: 3)
# max_retries = 3

# Base delay before first retry for server errors, in ms (default: 500)
# initial_delay_ms = 500

# Delay for rate limit errors (HTTP 429), in ms (default: 5000)
# rate_limit_delay_ms = 5000

# Delay for server overload errors (HTTP 529), in ms (default: 2000)
# overload_delay_ms = 2000

# Maximum backoff cap — exponential backoff will never exceed this, in ms (default: 60000)
# max_delay_ms = 60000

# ── Size limits ──────────────────────────────────────────────────────────────

[limits]
# Max artifact content size before truncation, in characters (default: 50000 = ~50KB)
# max_artifact_chars = 50000

# Max fetch_url response size before truncation, in characters (default: 50000 = ~50KB)
# max_fetch_chars = 50000

# TUI input buffer limit in bytes (default: 102400 = 100KB)
# tui_input_limit = 102400

# WebSocket message size limit in bytes (default: 1048576 = 1MB)
# websocket_max_bytes = 1048576

# Max entries returned by recall_recent/recall_search (default: 20, max: 50)
# recall_max_entries = 20

# Max CBR cases returned by recall_cases (default: 5, max: 20)
# cbr_max_results = 5

# Max results from web_search (DuckDuckGo) (default: 5, max: 10)
# web_search_max_results = 5

# Max results from Brave Search (default: 20, max: 20)
# brave_search_max_results = 20

# Brave Search rate limit in requests per second (default: 20)
# brave_rate_limit_rps = 20

# Brave Answers rate limit in requests per second (default: 2)
# brave_answers_rate_limit_rps = 2

# Brave Search cache TTL in milliseconds (default: 300000 = 5 min)
# brave_cache_ttl_ms = 300000

# Max queued inputs when cognitive loop is busy (default: 10)
# input_queue_cap = 10

# ── Thread scoring ───────────────────────────────────────────────────────────
# Overlap scoring weights for automatic thread assignment.

[scoring.threading]
# Weight for location overlap (default: 3)
# location_weight = 3

# Weight for domain overlap (default: 2)
# domain_weight = 2

# Weight for keyword overlap (default: 1)
# keyword_weight = 1

# Minimum overlap score to assign entry to existing thread (default: 3)
# threshold = 3

# ── CBR retrieval ────────────────────────────────────────────────────────────
# Case-Based Reasoning retrieval via weighted field scoring + inverted index.
# Scores are a weighted sum of four (optionally five) signals, each normalized 0.0–1.0.

[cbr]
# Enable semantic embeddings via Ollama (default: true)
# Requires Ollama running with the configured model pulled.
# The agent will NOT start if Ollama is unreachable or the model is missing.
# Set to false to disable embeddings and use only deterministic signals.
# embedding_enabled = true

# Ollama embedding model name (default: "nomic-embed-text")
# embedding_model = "nomic-embed-text"

# Ollama API base URL (default: http://localhost:11434)
# embedding_base_url = "http://localhost:11434"

# Weight for deterministic field scoring: intent, domain, keyword/entity jaccard (default: 0.35)
# field_weight = 0.35

# Weight for inverted index token overlap (default: 0.25)
# index_weight = 0.25

# Weight for recency — newer cases score higher (default: 0.15)
# recency_weight = 0.15

# Weight for exact domain match (default: 0.15)
# domain_weight = 0.15

# Weight for semantic embedding similarity (default: 0.10)
# When embeddings are unavailable, this weight is redistributed to other signals.
# embedding_weight = 0.10

# Minimum weighted score to include a case in results — 0.0 returns all (default: 0.0)
# min_score = 0.01

# ── Housekeeper ──────────────────────────────────────────────────────────────
# Supervised GenServer for periodic ETS/memory maintenance.
# Three tick intervals run independent maintenance passes.

[housekeeper]
# Short tick interval — narrative window trimming (default: 21600000 = 6h)
# short_tick_ms = 21600000

# Medium tick interval — fact conflicts + thread pruning (default: 43200000 = 12h)
# medium_tick_ms = 43200000

# Long tick interval — CBR dedup/pruning + DAG/artifact trim (default: 86400000 = 24h)
# long_tick_ms = 86400000

# Days of narrative entries to retain in ETS (default: 90)
# narrative_days = 90

# Days of CBR cases to retain (default: 180)
# cbr_days = 180

# Days of DAG nodes to retain in ETS (default: 30)
# dag_days = 30

# Days of artifact metadata to retain in ETS (default: 60)
# artifact_days = 60

# ── Housekeeping ─────────────────────────────────────────────────────────────
# Maintenance thresholds for CBR dedup, pruning, and fact management.

[housekeeping]
# Cosine similarity threshold for CBR case deduplication (default: 0.92)
# dedup_similarity = 0.92

# Confidence below this triggers CBR case pruning (default: 0.3)
# pruning_confidence = 0.3

# Minimum fact confidence for Curator display (default: 0.7)
# fact_confidence = 0.7

# Days after which low-confidence CBR cases are pruned (default: 60)
# cbr_pruning_days = 60

# Days after which single-cycle threads with no signal are pruned (default: 7)
# thread_pruning_days = 7

# ── Agent specifications ─────────────────────────────────────────────────────
# Per-agent configuration. Profiles override these when active.

[agents.planner]
# max_tokens = 2048
# max_turns = 3
# max_errors = 2

[agents.researcher]
# max_tokens = 2048
# max_turns = 8
# max_errors = 3
# max_context_messages = 30   # Sliding window to keep context lean

[agents.coder]
# max_tokens = 4096
# max_turns = 10
# max_errors = 3

[agents.writer]
# max_tokens = 4096
# max_turns = 5
# max_errors = 2

[agents.scheduler]
# max_tokens = 1024
# max_turns = 4
# max_errors = 2

# ── Web GUI ──────────────────────────────────────────────────────────────────

[web]
# Port for the web GUI when gui = "web" (default: 8080)
# port = 8080

# ── External services ───────────────────────────────────────────────────────
# Base URLs for third-party APIs. Override if using a proxy or self-hosted instance.

[services]
# DuckDuckGo HTML search endpoint
# duckduckgo_url = "https://html.duckduckgo.com/html/"

# Brave Search API
# brave_search_base_url = "https://api.search.brave.com"

# Brave Answers API (same base, different endpoint)
# brave_answers_base_url = "https://api.search.brave.com"

# Jina Reader API
# jina_reader_base_url = "https://r.jina.ai/"

# ── Sandbox ──────────────────────────────────────────────────────────────────
# Local Podman sandbox for coder agent code execution and serving.

[sandbox]
# Enable Podman sandbox for coder agent (default: false)
# Requires podman installed. On macOS, requires podman machine running.
# enabled = false

# Max containers in the pool (default: 1, max: 3)
# pool_size = 1

# Memory limit per container in MB (default: 512)
# memory_mb = 512

# CPU limit per container (default: "1")
# cpus = "1"

# Container image (default: "python:3.12-slim")
# image = "python:3.12-slim"

# Per-execution timeout in ms (default: 60000 = 1 min)
# exec_timeout_ms = 60000

# Host port base for serve mode (default: 10000)
# port_base = 10000

# Host port stride per slot — slot N maps to port_base + N*stride (default: 100)
# port_stride = 100

# Number of ports forwarded per slot (default: 5)
# ports_per_slot = 5

# Auto-start podman machine on macOS if not running (default: true)
# auto_machine = true

# ── XStructor ────────────────────────────────────────────────────────────────
# XML-schema-validated structured LLM output.

[xstructor]
# Max validation+retry attempts for XStructor XML generation (default: 3)
# max_retries = 3

# ── Forecaster ───────────────────────────────────────────────────────────────
# Plan-health forecaster using D' engine to detect when replanning is needed.

[forecaster]
# Enable the plan-health forecaster (default: false)
# enabled = false

# Tick interval for forecaster evaluation in ms (default: 300000 = 5 min)
# tick_ms = 300000

# D' score threshold above which a replan is suggested (default: 0.55)
# replan_threshold = 0.55

# Minimum completed cycles before forecaster begins evaluating (default: 2)
# min_cycles = 2

# Staleness threshold in ms — tasks idle longer than this are flagged (default: 1800000 = 30 min)
# stale_threshold_ms = 1800000
