# ─────────────────────────────────────────────────────────────────────────────
# Springdrift — example config.toml
# Copy to .springdrift/config.toml and customise.
# All fields are optional — defaults (shown in comments) are applied at startup.
# CLI flags always override config file values.
#
# IMPORTANT: bare keys (provider, max_tokens, gui, etc.) MUST appear before
# any [section] header. TOML assigns bare keys to the section above them.
# ─────────────────────────────────────────────────────────────────────────────

# ── Provider and models ──────────────────────────────────────────────────────
# "anthropic" | "vertex" | "openrouter" | "openai" | "mistral" | "local" | "mock"
provider = "mock"

# Top-level model overrides (apply regardless of provider — prefer per-provider sections)
# task_model = "claude-haiku-4-5-20251001"
# reasoning_model = "claude-opus-4-6"

# ── Behaviour ────────────────────────────────────────────────────────────────
max_tokens = 2048            # Max output tokens per LLM call
max_turns = 5                # React-loop iterations per message
max_consecutive_errors = 3   # Tool failures before abort
# max_context_messages = 100 # Sliding-window cap on context messages (default: unlimited)
gui = "web"                  # "tui" (terminal) or "web" (browser on port 8080)

# ── Logging ──────────────────────────────────────────────────────────────────
log_verbose = false
write_anywhere = false
# log_retention_days = 30
# log_max_file_bytes = 10485760
# skills_dirs = ["/path/to/my/skills"]

# ── D' safety ────────────────────────────────────────────────────────────────
# dprime_enabled = true
# dprime_config = "dprime.json"

# ─────────────────────────────────────────────────────────────────────────────
# Sections below. Order doesn't matter for [sections].
# ─────────────────────────────────────────────────────────────────────────────

# ── Identity ─────────────────────────────────────────────────────────────────

[agent]
name = "Nemo"                # Substituted into {{agent_name}} in identity/persona.md
version = "Springdrift Mk-3"

# ── Provider-specific models ─────────────────────────────────────────────────
# Only the active provider's section is used at runtime.

[anthropic]
# task_model = "claude-haiku-4-5-20251001"
# reasoning_model = "claude-opus-4-6"

[vertex]
# project_id = "my-gcp-project"
# location = "europe-west1"
# endpoint = "europe-west1-aiplatform.googleapis.com"
# task_model = "claude-haiku-4-5"
# reasoning_model = "claude-opus-4-6"

[mistral]
# task_model = "mistral-small-latest"
# reasoning_model = "mistral-large-latest"

[local]
# task_model = "smollm3-3b"
# reasoning_model = "smollm3-3b"

# ── Memory ───────────────────────────────────────────────────────────────────

[narrative]
threading = true
summaries = false
summary_schedule = "weekly"
# max_days = 30
# archivist_model = ""
# archivist_max_tokens = 4096
# redact_secrets = true
# preamble_budget_chars = 8000

[cbr]
# embedding_enabled = true
# embedding_model = "nomic-embed-text"
# embedding_base_url = "http://localhost:11434"
# Weights tuned from experiment-3 ablation (must sum to 1.0).
# When embeddings unavailable, embedding_weight is redistributed.
# field_weight = 0.10
# index_weight = 0.25
# recency_weight = 0.05
# domain_weight = 0.10
# embedding_weight = 0.40
# utility_weight = 0.10
# min_score = 0.01

[scoring.threading]
# location_weight = 3
# domain_weight = 2
# keyword_weight = 1
# threshold = 3

