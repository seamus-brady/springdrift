name = "springdrift"
version = "0.8.1"
description = "A knowledge worker agent framework for the BEAM. Persistent memory, scheduled research, configurable safety."
licences = ["MIT"]
repository = { type = "github", user = "seamus-brady", repo = "springdrift" }
gleam = ">= 1.11.0"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
etch = ">= 1.3.0 and < 2.0.0"
anthropic_gleam = ">= 0.1.1 and < 1.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"
gllm = ">= 1.0.0 and < 2.0.0"
simplifile = ">= 2.0.0 and < 3.0.0"
tom = ">= 2.0.1 and < 3.0.0"
mist = ">= 5.0.4 and < 6.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
dot_env = ">= 1.2.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
